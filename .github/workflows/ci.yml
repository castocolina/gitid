---
# gitid CI — SHA-pinned, least-privilege, cost-tiered gate (BUILD-01, BUILD-02, BUILD-04).
#
# Design (see .planning/phases/01-foundations-spikes-ci/01-07-PLAN.md):
#   - `build-cross` runs ONCE on ubuntu-latest. Cross-compilation via GOOS/GOARCH is
#     OS-independent (no cgo in this module), so running it redundantly on every matrix
#     runner would waste CI minutes for zero additional signal.
#   - `check` is the fast PR gate: `make setup-env` (reproduces the dev toolchain from a
#     fresh clone, BUILD-04) -> `make test` (-race) -> `make lint` (golangci-lint + gosec)
#     runs on ALL THREE corrected runners (ubuntu-latest, macos-15-intel, macos-15) on
#     every pull_request and every push to main. The earlier (now-stale) Intel/ARM macOS
#     runner labels from CONTEXT.md's original D-12 are deliberately NOT used — see
#     01-RESEARCH.md "State of the Art" for the deprecation timeline that motivated the
#     correction to the macos-15 labels used here.
#   - `make test-e2e` is heavier (builds the binary, drives it end-to-end) and is
#     cost-tiered per CONTEXT.md D-13's documented lever: it runs on ubuntu-latest and
#     macos-15 for every event (PR and push), and additionally on macos-15-intel ONLY on
#     push to main. This keeps every PR's cross-OS signal (Linux + Apple Silicon) while
#     deferring the third runner's e2e cost to the push-to-main gate — a deliberate,
#     documented choice to address CI cost/flakiness feedback, not an oversight.
#   - Every `uses:` step is pinned to a full 40-character commit SHA (tags are mutable)
#     with a trailing `# vX.Y.Z` comment for human readability.
#   - Least-privilege top-level `permissions: contents: read`. No repository secret is
#     referenced anywhere — Phase 1 CI needs none (release/tag publishing is BUILD-03,
#     Phase 10).
#
# CI invokes the SAME make targets a human runs locally (single source of truth) — no
# raw go/golangci-lint commands are inlined here.

name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  GO_VERSION: "1.26.x"

jobs:
  # Cross-compile the full release build matrix once, on Linux. GOOS/GOARCH
  # cross-compilation does not require the target OS to be present on the runner.
  build-cross:
    name: build-cross (ubuntu-latest)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: make build-cross
        run: make build-cross

  # Fast PR gate: reproduce the toolchain from a fresh clone, then run the race-enabled
  # test suite and lint on all three corrected runners. The heavier test-e2e step is
  # cost-tiered per D-13 (see header comment and the step's own `if:` condition).
  check:
    name: check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-15-intel, macos-15]
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: ${{ env.GO_VERSION }}
          # setup-go's built-in cache (module cache + build cache, keyed by go.sum)
          # avoids a redundant actions/cache dependency for this project's needs.
          cache: true

      - name: make setup-env (reproduce dev toolchain from a fresh clone)
        run: make setup-env

      - name: make test (-race)
        run: make test

      - name: make lint (golangci-lint + gosec)
        run: make lint

      # Cost-tiered per D-13: run test-e2e on ubuntu-latest + macos-15 for every event
      # (PR and push), but only run it on macos-15-intel when the event is a push to
      # main. This gives every PR cross-OS (Linux + Apple Silicon) e2e signal while
      # deferring the third runner's e2e cost to push/main.
      - name: make test-e2e
        if: ${{ matrix.os != 'macos-15-intel' || github.event_name == 'push' }}
        run: make test-e2e
